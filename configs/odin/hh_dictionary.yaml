# Household-level dictionary for ODIN (all years)
# ODIN has no household ID — OPID (person ID) serves as both hid and pid.
# One row per respondent is identified by OP == "1".

column_mappings:
  default:
    OPID: hid
    HHPers: hh_size
    HHBestInkG: hh_income
    HHAuto: vehicles
    Sted: hh_zone
    Weekdag: day
    Jaar: year
    Maand: month
    Week: week
    WoGem: home_gemeente
  2024:
    OPID: hid
    HHPers_DANS24: hh_size
    HHGestInkG: hh_income   # standardised income — same decile codes as HHBestInkG
    HHAuto_DANS24: vehicles
    Sted: hh_zone
    Weekdag: day
    Jaar: year
    Maand: month
    Week: week
    Wogem_DANS24: home_gemeente

# Approximate Dutch household disposable income decile boundaries (CBS 2018, EUR)
hh_income:
  default:
    "1":  [0, 16000]
    "2":  [16000, 22000]
    "3":  [22000, 29000]
    "4":  [29000, 36000]
    "5":  [36000, 44000]
    "6":  [44000, 54000]
    "7":  [54000, 63000]
    "8":  [63000, 78000]
    "9":  [78000, 115000]
    "10": [115000, 200000]
    "11": [0]   # unknown → None via sample_to_euro

# Sted (stedelijkheidsklasse): 1=very urban .. 5=not urban
hh_zone:
  default:
    "1": urban
    "2": urban
    "3": suburban
    "4": rural
    "5": rural

# Weekdag: 1=Sunday, 2=Monday .. 7=Saturday
day:
  default:
    "1": sunday
    "2": monday
    "3": tuesday
    "4": wednesday
    "5": thursday
    "6": friday
    "7": saturday
