# Trip-level dictionary for ODIN (all years)
# Regular trips are identified by Verpl == "1".
# Sted (urbanisation class) is used for both ozone and dzone in the loader
# (not listed in column_mappings because it maps to two output columns).

column_mappings:
  default:
    OPID: pid
    VerplNr: seq
    Hvm: mode
    VertLoc: oact
    Doel: dact
    VertUur: tst_hour
    VertMin: tst_min
    AankUur: tet_hour
    AankMin: tet_min
    AfstV: distance

# Hvm (hoofdvervoermiddel / main mode of transport)
mode:
  default:
    "1":  car    # Personenauto
    "2":  rail   # Trein
    "3":  bus    # Bus
    "4":  rail    # Tram
    "5":  rail    # Metro
    "6":  bike   # Speedpedelec
    "7":  bike   # Elektrische fiets
    "8":  bike   # Niet-elektrische fiets
    "9":  walk   # Te voet
    "10": bus  # Coach
    "11": car  # van
    "12": car  # truck
    "13": car  # Camper
    "14": car  # Taxi/Taxibusje
    "15": other  # agricultural vehicle
    "16": car  # Motor cycle
    "17": car  # moped
    "18": car  # scooter
    "19": other  # motorised mobility aid
    "20": other  # non motorised mobility aid
    "21": other  # Skates/skeelers/step
    "22": other  # Boat
    "23": other  # Other motorised vehicle
    "24": other  # Other non-motorised vehicle

# VertLoc (vertreklocatie / departure location type) → origin activity
oact:
  default:
    "1": home    # eigen woonadres
    "2": home    # ander thuisadres
    "3": work    # een werkadres
    "4": other   # ander adres

# Doel (bestemming / destination purpose) → destination activity
dact:
  default:
    "1":  home
    "2":  work       # werken
    "3":  work       # zakelijk bezoek in werksfeer
    "4":  work       # beroepsmatig
    "5":  escort     # afhalen/brengen personen
    "6":  other      # afhalen/brengen goederen
    "7":  education  # onderwijs/cursus volgen
    "8":  shop       # winkelen/boodschappen doen
    "9":  visit      # visite/logeren
    "10": leisure    # toeren/wandelen
    "11": leisure    # sport/hobby
    "12": leisure    # overige vrijetijdsbesteding
    "13": medical    # diensten/persoonlijke verzorging
    "14": other      # ander doel

# Sted (urbanisation class of home municipality) used as zone proxy
ozone:
  default:
    "1": urban
    "2": urban
    "3": suburban
    "4": rural
    "5": rural

dzone:
  default:
    "1": urban
    "2": urban
    "3": suburban
    "4": rural
    "5": rural
