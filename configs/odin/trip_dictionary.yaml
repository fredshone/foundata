# Trip-level dictionary for ODIN (all years)
# Regular trips are identified by Verpl == "1".
# ozone/dzone are derived in the loader by joining VertGem/AankGem (origin/
# destination gemeente code) against configs/odin/zones/kwb_*.csv for the
# trip's year, then mapping the resulting stedelijkheidsklasse below.
# 2024 renames VertGem/AankGem to VertGem_DANS24/AankGem_DANS24 — everything
# else is unchanged from default.

column_mappings:
  default:
    OPID: pid
    VerplNr: seq
    Hvm: mode
    VertLoc: oact
    Doel: dact
    VertUur: tst_hour
    VertMin: tst_min
    AankUur: tet_hour
    AankMin: tet_min
    AfstV: distance
    VertGem: origin_gemeente
    AankGem: destination_gemeente
  2024:
    OPID: pid
    VerplNr: seq
    Hvm: mode
    VertLoc: oact
    Doel: dact
    VertUur: tst_hour
    VertMin: tst_min
    AankUur: tet_hour
    AankMin: tet_min
    AfstV: distance
    VertGem_DANS24: origin_gemeente
    AankGem_DANS24: destination_gemeente

# Hvm (hoofdvervoermiddel / main mode of transport)
mode:
  default:
    "1":  car    # Personenauto
    "2":  rail   # Trein
    "3":  bus    # Bus
    "4":  rail    # Tram
    "5":  rail    # Metro
    "6":  bike   # Speedpedelec
    "7":  bike   # Elektrische fiets
    "8":  bike   # Niet-elektrische fiets
    "9":  walk   # Te voet
    "10": bus  # Coach
    "11": car  # van
    "12": car  # truck
    "13": car  # Camper
    "14": car  # Taxi/Taxibusje
    "15": other  # agricultural vehicle
    "16": car  # Motor cycle
    "17": car  # moped
    "18": car  # scooter
    "19": other  # motorised mobility aid
    "20": other  # non motorised mobility aid
    "21": other  # Skates/skeelers/step
    "22": other  # Boat
    "23": other  # Other motorised vehicle
    "24": other  # Other non-motorised vehicle

# VertLoc (vertreklocatie / departure location type) → origin activity
oact:
  default:
    "1": home    # eigen woonadres
    "2": home    # ander thuisadres
    "3": work    # een werkadres
    "4": other   # ander adres

# Doel (bestemming / destination purpose) → destination activity
dact:
  default:
    "1":  home
    "2":  work       # werken
    "3":  work       # zakelijk bezoek in werksfeer
    "4":  work       # beroepsmatig
    "5":  escort     # afhalen/brengen personen
    "6":  other      # afhalen/brengen goederen
    "7":  education  # onderwijs/cursus volgen
    "8":  shop       # winkelen/boodschappen doen
    "9":  visit      # visite/logeren
    "10": null       # toeren/wandelen — round trip, resolved to match the
                     # origin activity in odin.load_trips (not a genuine
                     # leisure destination: the trip has no fixed destination
                     # and returns to where it started)
    "11": leisure    # sport/hobby
    "12": leisure    # overige vrijetijdsbesteding
    "13": medical    # diensten/persoonlijke verzorging
    "14": other      # ander doel

# Stedelijkheidsklasse (1-5, CBS OAD-based) of the trip's origin/destination
# gemeente, looked up from configs/odin/gemeente_stedelijkheid.csv. Same scale
# as Sted (used for hh_zone), shared between ozone and dzone.
stedelijkheidsklasse:
  default:
    "1": urban
    "2": urban
    "3": suburban
    "4": rural
    "5": rural
