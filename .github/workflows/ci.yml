name: CI

on:
  push:
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check foundata/

      # - name: Format check
      #   run: uv run ruff format foundata/ --check

      - name: Test
        run: uv run pytest tests/ -v
