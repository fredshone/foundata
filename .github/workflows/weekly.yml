name: Weekly

on:
  schedule:
    - cron: "0 8 * * 1"
  workflow_dispatch:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check foundata/

      # - name: Format check
      #   run: uv run ruff format foundata/ --check

      - name: Test
        run: uv run pytest tests/ -v
